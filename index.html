<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔭</text></svg>">
  <title>Paperscope — AI Research Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --world-model: #6366f1;
      --physical-ai: #10b981;
      --medical-ai: #f43f5e;
      --bg: #050508;
      --card-bg: rgba(18, 18, 28, 0.85);
      --card-bg-hover: rgba(25, 25, 40, 0.95);
      --text: #f0f0fa;
      --text-secondary: #9090a8;
      --text-muted: #52526a;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.15);
      --accent: #818cf8;
      --header-bg: rgba(8, 8, 15, 0.9);
      --surface-bg: rgba(255, 255, 255, 0.03);
      --surface-border: rgba(255, 255, 255, 0.06);
      --surface-hover-border: rgba(255, 255, 255, 0.12);
      --header-border: rgba(255, 255, 255, 0.08);
      --logo-gradient: linear-gradient(135deg, #fff 30%, #a78bfa);
      --glow-a: rgba(99, 102, 241, 0.2);
      --glow-b: rgba(16, 185, 129, 0.15);
      --glow-c: rgba(244, 63, 94, 0.12);
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
      --shadow-hover: 0 12px 48px rgba(0, 0, 0, 0.6);
      --glass-blur: blur(20px);
    }
    :root[data-theme="light"] {
      --bg: #f0f0f8;
      --card-bg: #ffffff;
      --card-bg-hover: #f8f8ff;
      --text: #111122;
      --text-secondary: #44445a;
      --text-muted: #888898;
      --border: #e0e0ec;
      --border-hover: #c4c4d8;
      --accent: #6366f1;
      --header-bg: rgba(248,248,255,0.95);
      --surface-bg: rgba(0,0,0,0.025);
      --surface-border: rgba(0,0,0,0.05);
      --surface-hover-border: rgba(0,0,0,0.10);
      --header-border: rgba(0,0,0,0.06);
      --logo-gradient: linear-gradient(135deg,#1a1a2e 30%,#6366f1);
      --glow-a: rgba(99,102,241,0.07);
      --glow-b: rgba(16,185,129,0.05);
      --shadow-card: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.11);
    }
    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 100% 70% at 10% -10%, var(--glow-a) 0%, transparent 50%),
        radial-gradient(ellipse 80% 60% at 90% 110%, var(--glow-b) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 50% 50%, var(--glow-c) 0%, transparent 60%),
        linear-gradient(180deg, transparent 0%, rgba(5, 5, 8, 0.5) 100%);
      pointer-events: none; z-index: -1;
      animation: bgPulse 20s ease-in-out infinite;
    }
    @keyframes bgPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }

    /* ─── Header ─────────────────── */
    .header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
      padding: 0.75rem 0;
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: var(--glass-blur) saturate(180%);
      -webkit-backdrop-filter: var(--glass-blur) saturate(180%);
      transition: all 0.3s ease;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
    }
    .header-content {
      max-width: 1400px; margin: 0 auto; padding: 0 1.5rem;
      display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;
    }
    .logo { display: flex; align-items: center; gap: 0.7rem; text-decoration: none; }
    .logo-icon {
      width: 38px; height: 38px; border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #818cf8, #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .logo-text { display: flex; flex-direction: column; line-height: 1.15; }
    .logo h1 {
      font-size: 1.25rem; font-weight: 700;
      background: var(--logo-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    .logo-tagline { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.05em; }
    .logo-badge {
      font-size: 0.6rem; padding: 0.18rem 0.5rem;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(129, 140, 248, 0.1));
      color: var(--accent);
      border: 1px solid rgba(129, 140, 248, 0.3); border-radius: 20px; font-weight: 700;
      backdrop-filter: blur(4px);
    }

    /* Header controls */
    .header-controls { display: flex; gap: 0.45rem; margin-left: auto; align-items: center; }
    .toggle-group {
      display: flex; gap: 0.18rem; align-items: center;
      background: var(--surface-bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.14rem;
    }
    .toggle-btn {
      padding: 0.28rem 0.5rem; border-radius: 6px; cursor: pointer;
      border: none; background: transparent; color: var(--text-muted);
      font-size: 0.78rem; line-height: 1; transition: all 0.18s;
    }
    .toggle-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .toggle-btn.active { background: var(--accent); color: #fff; box-shadow: 0 0 10px rgba(129,140,248,0.4); }
    .lang-btn { font-size: 0.67rem; font-weight: 700; padding: 0.28rem 0.5rem; }

    /* Source tabs (arXiv / 顶会顶刊) */
    .source-tabs {
      display: flex; gap: 0.25rem;
      background: var(--surface-bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.18rem;
    }
    .source-tab {
      display: flex; align-items: center; gap: 0.35rem;
      padding: 0.38rem 0.9rem; border-radius: 8px;
      font-size: 0.82rem; font-weight: 600;
      text-decoration: none; color: var(--text-muted);
      transition: all 0.18s; white-space: nowrap;
    }
    .source-tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .source-tab.active {
      background: var(--accent); color: #fff;
      box-shadow: 0 0 14px rgba(129,140,248,0.35);
    }
    .source-tab-icon { font-size: 0.85rem; }
    :root[data-theme="light"] .source-tab.active { background: var(--accent); }

    /* Domain tabs */
    .domain-tabs { display: flex; gap: 0.38rem; flex-wrap: wrap; }
    .domain-tab {
      padding: 0.38rem 0.78rem; border-radius: 8px; font-size: 0.77rem; font-weight: 500;
      cursor: pointer; transition: all 0.18s; border: 1px solid transparent; white-space: nowrap;
    }
    .domain-tab.all { background: var(--surface-bg); color: var(--text-secondary); border-color: var(--border); }
    .domain-tab.all.active { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); color: var(--text); }
    :root[data-theme="light"] .domain-tab.all.active { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.14); }
    .domain-tab.world_model { background: rgba(99,102,241,0.08); color: #a5b4fc; border-color: rgba(99,102,241,0.2); }
    :root[data-theme="light"] .domain-tab.world_model { color: #4f46e5; }
    .domain-tab.world_model.active { background: rgba(99,102,241,0.17); border-color: var(--world-model); box-shadow: 0 0 14px rgba(99,102,241,0.22); }
    .domain-tab.physical_ai { background: rgba(16,185,129,0.08); color: #6ee7b7; border-color: rgba(16,185,129,0.2); }
    :root[data-theme="light"] .domain-tab.physical_ai { color: #059669; }
    .domain-tab.physical_ai.active { background: rgba(16,185,129,0.17); border-color: var(--physical-ai); box-shadow: 0 0 14px rgba(16,185,129,0.22); }
    .domain-tab.medical_ai { background: rgba(244,63,94,0.08); color: #fda4af; border-color: rgba(244,63,94,0.2); }
    :root[data-theme="light"] .domain-tab.medical_ai { color: #e11d48; }
    .domain-tab.medical_ai.active { background: rgba(244,63,94,0.17); border-color: var(--medical-ai); box-shadow: 0 0 14px rgba(244,63,94,0.22); }

    /* ─── Container ──────────────── */
    .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 1.5rem 3rem; }

    /* ─── Stat cards ─────────────── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.1rem;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative; cursor: pointer; overflow: hidden;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .stat-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%);
      pointer-events: none;
    }
    .stat-card::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      opacity: 0; transition: opacity 0.3s;
      border-radius: 0 0 16px 16px;
    }
    .stat-card:hover {
      transform: translateY(-4px) scale(1.02);
      border-color: var(--border-hover);
      box-shadow: var(--shadow-hover);
    }
    .stat-card:hover::after { opacity: 1; }
    .stat-card[data-switch-domain="all"]::after     { background: linear-gradient(90deg, #64748b, #94a3b8, #cbd5e1); }
    .stat-card[data-switch-domain="world_model"]::after  { background: linear-gradient(90deg, #6366f1, #818cf8, #a78bfa); }
    .stat-card[data-switch-domain="physical_ai"]::after  { background: linear-gradient(90deg, #10b981, #34d399, #6ee7b7); }
    .stat-card[data-switch-domain="medical_ai"]::after   { background: linear-gradient(90deg, #f43f5e, #fb7185, #fda4af); }
    .stat-value { font-size: 2.2rem; font-weight: 800; line-height: 1; letter-spacing: -0.04em; }
    .stat-value.world_model { color: #a5b4fc; text-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
    .stat-value.physical_ai { color: #6ee7b7; text-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
    .stat-value.medical_ai  { color: #fda4af; text-shadow: 0 0 20px rgba(244, 63, 94, 0.4); }
    :root[data-theme="light"] .stat-value.world_model { color: #4f46e5; text-shadow: none; }
    :root[data-theme="light"] .stat-value.physical_ai { color: #059669; text-shadow: none; }
    :root[data-theme="light"] .stat-value.medical_ai  { color: #e11d48; text-shadow: none; }
    .stat-card .new-badge {
      position: absolute; top: 0.6rem; right: 0.6rem;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-size: 0.6rem;
      padding: 0.12rem 0.4rem;
      border-radius: 8px;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(34, 197, 94, 0.4);
    }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem; font-weight: 500; letter-spacing: 0.01em; }

    /* ─── Subdomain ──────────────── */
    .subdomain-section {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
      padding: 1rem 1.25rem; margin-bottom: 1.1rem;
    }
    .subdomain-title {
      font-size: 0.7rem; font-weight: 700; margin-bottom: 0.85rem; color: var(--text-muted);
      display: flex; align-items: center; gap: 0.4rem;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .subdomain-grid { display: flex; flex-wrap: wrap; gap: 0.42rem; align-items: flex-start; }
    .subdomain-domain-header {
      width: 100%; font-size: 0.68rem; font-weight: 700; color: var(--text-muted);
      margin: 0.5rem 0 0.22rem; padding-bottom: 0.22rem;
      border-bottom: 1px solid var(--surface-border);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .subdomain-domain-header:first-child { margin-top: 0; }
    .subdomain-item {
      display: inline-flex; align-items: center; gap: 0.38rem;
      padding: 0.36rem 0.68rem; border-radius: 20px;
      background: var(--surface-bg); border: 1px solid var(--surface-border);
      cursor: pointer; transition: all 0.17s ease; font-size: 0.77rem;
    }
    .subdomain-item:hover { background: rgba(129,140,248,0.08); border-color: rgba(129,140,248,0.25); transform: translateY(-1px); }
    .subdomain-item.active { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.35); }
    .subdomain-item .name { color: var(--text-secondary); font-weight: 500; }
    .subdomain-item .count { font-weight: 700; color: var(--text); }
    .subdomain-item .new-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 17px; height: 17px; padding: 0 4px;
      background: linear-gradient(135deg,#22c55e,#16a34a);
      color: white; font-size: 0.57rem; font-weight: 700; border-radius: 9px; margin-left: 1px;
    }

    /* ─── Charts ─────────────────── */
    .charts-section { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .chart-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s ease;
      backdrop-filter: blur(12px);
    }
    .chart-panel:hover { border-color: var(--border-hover); box-shadow: var(--shadow-card); }
    .chart-header {
      display: flex; align-items: center; gap: 0.55rem;
      padding: 0.85rem 1.1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.02), transparent);
    }
    .chart-icon { font-size: 1rem; }
    .chart-title { font-size: 0.82rem; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
    .chart-note { font-size: 0.68rem; color: var(--text-muted); margin-left: auto; }
    .chart-body { padding: 1.1rem; min-height: 220px; }
    .trend-bar-group { display: flex; flex-direction: column; gap: 0.6rem; }
    .trend-year { display: flex; align-items: center; gap: 0.8rem; }
    .trend-year-label { width: 38px; font-size: 0.72rem; font-weight: 700; color: var(--text-secondary); }
    .trend-bars { flex: 1; display: flex; height: 22px; border-radius: 6px; overflow: hidden; background: rgba(255, 255, 255, 0.03); }
    .trend-bar { height: 100%; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; min-width: 3px; }
    .trend-bar:hover { filter: brightness(1.25); transform: scaleY(1.1); }
    .trend-bar.world_model { background: linear-gradient(90deg, #6366f1, #818cf8, #a78bfa); }
    .trend-bar.physical_ai { background: linear-gradient(90deg, #10b981, #34d399, #6ee7b7); }
    .trend-bar.medical_ai  { background: linear-gradient(90deg, #f43f5e, #fb7185, #fda4af); }
    .trend-count { width: 48px; text-align: right; font-size: 0.7rem; font-weight: 700; color: var(--text-secondary); }
    .hot-item { display: flex; align-items: center; gap: 0.65rem; margin-bottom: 0.55rem; }
    .hot-rank {
      width: 22px; height: 22px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.62rem; font-weight: 800; flex-shrink: 0;
    }
    .hot-rank.rank-1 { background: linear-gradient(135deg,#f59e0b,#d97706); color: white; }
    .hot-rank.rank-2 { background: linear-gradient(135deg,#94a3b8,#64748b); color: white; }
    .hot-rank.rank-3 { background: linear-gradient(135deg,#b45309,#92400e); color: white; }
    .hot-rank.rank-other { background: var(--surface-bg); color: var(--text-muted); border: 1px solid var(--border); }
    .hot-name { flex: 1; font-size: 0.79rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hot-bar-wrap { width: 78px; height: 7px; background: var(--surface-bg); border-radius: 4px; overflow: hidden; }
    .hot-bar { height: 100%; border-radius: 4px; background: linear-gradient(90deg,var(--accent),#a78bfa); transition: width 0.5s ease; }
    .hot-bar.world_model { background: linear-gradient(90deg,#6366f1,#818cf8); }
    .hot-bar.physical_ai { background: linear-gradient(90deg,#10b981,#34d399); }
    .hot-bar.medical_ai  { background: linear-gradient(90deg,#f43f5e,#fb7185); }
    .hot-domain-header {
      font-size: 0.67rem; font-weight: 700; margin: 0.6rem 0 0.3rem;
      padding-bottom: 0.2rem; border-bottom: 1px solid var(--surface-border);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .hot-domain-header.world_model { color: #a5b4fc; }
    .hot-domain-header.physical_ai { color: #6ee7b7; }
    .hot-domain-header.medical_ai  { color: #fda4af; }
    :root[data-theme="light"] .hot-domain-header.world_model { color: #4f46e5; }
    :root[data-theme="light"] .hot-domain-header.physical_ai { color: #059669; }
    :root[data-theme="light"] .hot-domain-header.medical_ai  { color: #e11d48; }
    .hot-domain-header:first-child { margin-top: 0; }
    .hot-count { width: 30px; text-align: right; font-size: 0.72rem; font-weight: 700; color: var(--text-secondary); }

    /* ─── Filter row ─────────────── */
    .filter-row {
      display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center;
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 0.7rem;
    }
    .search-box { flex: 1; min-width: 0; position: relative; }
    .search-box input {
      width: 100%; padding: 0.52rem 0.8rem 0.52rem 2.15rem;
      background: var(--surface-bg); border: 1px solid var(--surface-border);
      border-radius: 8px; color: var(--text); font-size: 0.82rem; transition: border-color 0.2s;
    }
    .search-box input:focus { outline: none; border-color: var(--accent); }
    .search-box::before { content: '🔍'; position: absolute; left: 0.68rem; top: 50%; transform: translateY(-50%); font-size: 0.8rem; opacity: 0.38; }
    .filter-select {
      padding: 0.52rem 0.72rem; background: var(--surface-bg); border: 1px solid var(--surface-border);
      border-radius: 8px; color: var(--text); font-size: 0.77rem; cursor: pointer; min-width: 94px; transition: border-color 0.2s;
    }
    .filter-select:focus { outline: none; border-color: var(--accent); }
    .action-btns { display: flex; gap: 0.32rem; }
    .action-btn {
      padding: 0.52rem 0.78rem; border-radius: 8px; font-size: 0.72rem; font-weight: 500;
      cursor: pointer; border: 1px solid var(--surface-border); background: var(--surface-bg);
      color: var(--text-secondary); transition: all 0.17s; white-space: nowrap;
    }
    .action-btn:hover { background: rgba(129,140,248,0.08); color: var(--text); border-color: rgba(129,140,248,0.2); }
    .action-btn.active { background: rgba(129,140,248,0.14); color: var(--accent); border-color: rgba(129,140,248,0.3); }

    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .results-count { color: var(--text-muted); font-size: 0.77rem; font-weight: 500; }

    /* ─── Paper cards ─────────────── */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .papers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1rem; }
    .paper-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.1rem 1.1rem 1.1rem 1.3rem;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column;
      animation: cardIn 0.4s ease forwards;
      position: relative; overflow: hidden;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .paper-card::before {
      content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 4px;
      background: var(--border); transition: all 0.3s;
      border-radius: 4px 0 0 4px;
    }
    .paper-card::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 40%);
      pointer-events: none;
    }
    .paper-card.domain-world_model::before { background: linear-gradient(180deg, #6366f1, #818cf8, #a78bfa); }
    .paper-card.domain-physical_ai::before { background: linear-gradient(180deg, #10b981, #34d399, #6ee7b7); }
    .paper-card.domain-medical_ai::before  { background: linear-gradient(180deg, #f43f5e, #fb7185, #fda4af); }
    .paper-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-6px) scale(1.01);
      box-shadow: var(--shadow-hover);
      background: var(--card-bg-hover);
    }
    .paper-card.domain-world_model:hover { box-shadow: 0 16px 48px rgba(99, 102, 241, 0.18); }
    .paper-card.domain-physical_ai:hover { box-shadow: 0 16px 48px rgba(16, 185, 129, 0.18); }

    /* ─── Pagination ─────────────── */
    .pagination { display: flex; justify-content: center; gap: 0.4rem; margin-top: 2rem; }
    .page-btn {

      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.25s;

    .page-btn.active {

      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 16px rgba(129, 140, 248, 0.4);
      font-weight: 600;

    .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .loading, .empty { text-align: center; padding: 3rem; color: var(--text-muted); }

    /* ─── Footer stats ─────────── */
    .footer {
      border-top: 1px solid var(--border); padding: 1rem 1.5rem;
      text-align: center; color: var(--text-muted); font-size: 0.7rem;

    .footer-meta {
      display: flex; justify-content: center; align-items: center;

    .doc-btn {
      display: inline-flex; align-items: center; gap: 0.28rem;

    .doc-overlay {

      opacity: 0; visibility: hidden; transition: all 0.25s;

    .doc-overlay.active { opacity: 1; visibility: visible; }
    .doc-modal {
      background: var(--card-bg); border: 1px solid var(--border);

    .doc-modal h2 {

    .doc-modal .doc-contact a:hover { text-decoration: underline; }
    .doc-close {
      position: absolute; top: 1rem; right: 1rem; background: none; border: none;

        paperCount: n => `${n} paper${n === 1 ? '' : 's'}`,
        expandAbstract: 'Show more', collapseAbstract: 'Show less',
        badgeMethod: 'Method', badgeDataset: 'Dataset', badgeSurvey: 'Survey',
        domainNameWM: 'World Model', domainNamePA: 'Physical AI', domainNameMA: 'Medical AI',
        alertNoFav: 'No saved papers yet — click ⭐ on any card to bookmark',
        docBtn: 'About',
        docDesc1: 'Paperscope automatically tracks the latest arXiv papers, using AI to classify them into three cutting-edge domains: World Model, Physical AI, and Medical AI — helping researchers and practitioners stay on top of frontiers.',
        docDesc2: 'Updated daily via GitHub Actions, the platform supports multi-dimensional filtering by domain, subfield, time, and type, with visual trend analysis and BibTeX export.',
        docContact: 'Contact: ',
        visitorLabel: 'Visitors',
        updateLabel: 'Updated',
        taskNames: {}  // populated dynamically from task_meta.json
      }
    };
    function t(key) { return i18n[currentLang][key] || i18n['zh'][key] || key; }
    // Task name lookup: dynamic (task_meta.json) first, then fallback to raw abbreviation
    let taskMeta = {};   // { VidGen: {zh:'视频生成/预测', en:'Video Generation'}, ... }
    let domainTasksMeta = {};  // { world_model: [...], physical_ai: [...], medical_ai: [...] }
    function tn(task) {
      const entry = taskMeta[task];
      if (entry) return entry[currentLang] || entry['zh'] || task;
      return task;
    }

    function applyLang(lang) {
      currentLang = lang;
      localStorage.setItem('paperHubLang', lang);
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.title = t('docTitle');
      // Domain tabs
      document.querySelector('.domain-tab.all').textContent = t('tabAll');
      document.querySelector('.domain-tab.world_model').textContent = t('tabWM');
      document.querySelector('.domain-tab.physical_ai').textContent = t('tabPA');
      document.querySelector('.domain-tab.medical_ai').textContent = t('tabMA');
      // Stat labels
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[currentLang][key] !== undefined) el.textContent = i18n[currentLang][key];
      });
      // Search
      document.getElementById('searchInput').placeholder = t('searchPlaceholder');
      // Filters
      rebuildFilters();
      // Action buttons
      document.getElementById('hasCodeBtn').textContent = t('hasCode');
      document.getElementById('favoritesBtn').textContent = t('favorites');
      document.getElementById('exportBtn').textContent = t('export');
      // Lang toggle buttons
      document.querySelectorAll('#langToggle .lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
      // Re-render dynamic content
      if (allPapers.length) {
        updateFooterMeta();
        renderSubdomains();
        renderCharts();
        applyFilters();
      }
    }

    // ====== Theme ======
    function getSystemTheme() { return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }
    function applyTheme(theme) {
      const effective = theme === 'system' ? getSystemTheme() : theme;
      document.documentElement.setAttribute('data-theme', effective);
      document.querySelectorAll('#themeToggle .toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
    }
    function setTheme(theme) { localStorage.setItem('paperHubTheme', theme); applyTheme(theme); }

    // ====== Init ======
    let allPapers = [], filteredPapers = [];
    let currentPage = 1;
    const PAGE_SIZE = 20;
    let currentDomain = 'all', currentTask = 'all', currentQuery = '';
    let currentYear = 'all', currentMonth = 'all', currentType = 'all', currentSort = 'date-desc';
    let showFavorites = false, showHasCode = false;
    let favorites = JSON.parse(localStorage.getItem('paperHubFavorites') || '[]');

    const domainConfig = {
      'world_model': {color:'#6366f1'},
      'physical_ai': {color:'#10b981'},
      'medical_ai': {color:'#f43f5e'}
    };
    // Fallback static map (overridden at runtime by task_meta.json)
    let domainTasks = {
      'world_model': ['VidGen', 'NeRF', 'MBRL', 'Sim2Real', 'EmbodiedWM', 'Predictive'],
      'physical_ai': ['PINN', 'NeuralOp', 'Embodied', 'RobotLearn', 'FluidSim', 'Climate', '3DRecon'],
      'medical_ai': ['Pathology', 'MedImg', 'Cancer', 'MedVLM', 'DrugMol', 'Protein', 'Clinical', 'Surgery', 'HealthMon']
    };

    async function init() {
      try {
        // Load papers, task metadata, and trending topics in parallel
        const [papersResp, metaResp, trendResp] = await Promise.allSettled([
          fetch('output/papers.json'),
          fetch('output/task_meta.json'),
          fetch('output/trending.json')
        ]);

        // Apply task metadata first so labels are ready before rendering
        if (metaResp.status === 'fulfilled' && metaResp.value.ok) {
          const meta = await metaResp.value.json();
          taskMeta = meta.tasks || {};
          // Override domainTasks with dynamic mapping from task_meta.json
          if (meta.domain_tasks && Object.keys(meta.domain_tasks).length > 0) {
            domainTasks = meta.domain_tasks;
          }
          // Sync i18n taskNames so any legacy code still using i18n path works
          Object.keys(taskMeta).forEach(k => {
            i18n.zh.taskNames[k] = taskMeta[k].zh || k;
            i18n.en.taskNames[k] = taskMeta[k].en || k;
          });
        }

        // Load trending topics (from abstract n-gram analysis)
        if (trendResp.status === 'fulfilled' && trendResp.value.ok) {
          const trendJson = await trendResp.value.json();
          trendingData = trendJson.trends || {};
        }

        if (papersResp.status === 'fulfilled' && papersResp.value.ok) {
          allPapers = await papersResp.value.json();
        } else {
          throw new Error('Failed to load papers.json');
        }

        allPapers = allPapers.filter(p => p.year >= 2023);
        updateFooterMeta();
        initFilters();  // Rebuild filters after data loads
        updateStats();
        renderSubdomains();
        renderCharts();
        applyFilters();
      } catch(e) {
        document.getElementById('papersGrid').innerHTML = `<div class="empty"><h3>${t('noDataTitle')}</h3><p>${t('noDataHint')}</p></div>`;
      }
    }

    function updateFooterMeta() {
      // Update time: latest paper's published date
      if (allPapers.length) {
        const latest = allPapers.reduce((a, b) => new Date(a.published) > new Date(b.published) ? a : b);
        const d = new Date(latest.published);
        const dateStr = currentLang === 'zh'
          ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
          : d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        document.getElementById('updateTime').textContent = dateStr;
      }
      // Visitor count via visitor-badge.io (free, no signup)
      fetch('https://api.visitorbadge.io/api/visits?path=papers4ai.github.io&label=&countColor=%23818cf8&style=flat')
        .then(r => r.json())
        .then(data => {
          document.getElementById('visitorCount').textContent = data.value || data.count || '—';
        })
        .catch(() => {
          // Fallback: local session counter
          let c = parseInt(localStorage.getItem('paperHubVisits') || '0') + 1;
          localStorage.setItem('paperHubVisits', c);
          document.getElementById('visitorCount').textContent = c;
        });
    }

    function updateStats() {
      const now = new Date();
      const weekAgo = new Date(now.getTime() - 7*24*60*60*1000);
      let wm = 0, pa = 0, ma = 0, newWM = 0, newPA = 0, newMA = 0, total = 0, newTotal = 0;
      allPapers.forEach(p => {
        const isNew = new Date(p.published) >= weekAgo;
        const hasDomain = p._domains && p._domains.length > 0;
        if (hasDomain) { total++; if(isNew) newTotal++; }
        if (p._domains?.includes('world_model')) { wm++; if(isNew) newWM++; }
        if (p._domains?.includes('physical_ai')) { pa++; if(isNew) newPA++; }
        if (p._domains?.includes('medical_ai')) { ma++; if(isNew) newMA++; }
      });
      document.getElementById('totalCount').textContent = total;
      document.getElementById('newBadgeTotal').textContent = '+' + newTotal;
      document.getElementById('worldModelCount').textContent = wm;
      document.getElementById('newBadgeWM').textContent = '+' + newWM;
      document.getElementById('physicalAiCount').textContent = pa;
      document.getElementById('newBadgePA').textContent = '+' + newPA;
      document.getElementById('medicalAiCount').textContent = ma;
      document.getElementById('newBadgeMA').textContent = '+' + newMA;
    }

    function renderCharts() {
      const yearDomain = {world_model:{}, physical_ai:{}, medical_ai:{}};
      allPapers.forEach(p => {
        (p._domains||[]).forEach(d => {
          if(!yearDomain[d]) yearDomain[d] = {};
          yearDomain[d][p.year] = (yearDomain[d][p.year] || 0) + 1;
        });
      });
      const years = [...new Set(allPapers.filter(p => p._domains?.length).map(p => p.year))].sort();
      const yearTotals = {};
      years.forEach(y => {
        yearTotals[y] = (yearDomain.world_model[y]||0) + (yearDomain.physical_ai[y]||0) + (yearDomain.medical_ai[y]||0);
      });
      const maxTotal = Math.max(...Object.values(yearTotals), 1);

      let trendHtml = '<div class="trend-bar-group">';
      years.forEach(y => {
        const wm = yearDomain.world_model[y] || 0;
        const pa = yearDomain.physical_ai[y] || 0;
        const ma = yearDomain.medical_ai[y] || 0;
        const total = wm + pa + ma;
        const wmPct = (wm / maxTotal * 100).toFixed(1);
        const paPct = (pa / maxTotal * 100).toFixed(1);
        const maPct = (ma / maxTotal * 100).toFixed(1);
        trendHtml += `
          <div class="trend-year">
            <span class="trend-year-label">${y}</span>
            <div class="trend-bars">
              ${wm > 0 ? `<div class="trend-bar world_model" style="width:${wmPct}%" title="${t('trendLegendWM')}: ${wm}"></div>` : ''}
              ${pa > 0 ? `<div class="trend-bar physical_ai" style="width:${paPct}%" title="${t('trendLegendPA')}: ${pa}"></div>` : ''}
              ${ma > 0 ? `<div class="trend-bar medical_ai" style="width:${maPct}%" title="${t('trendLegendMA')}: ${ma}"></div>` : ''}
            </div>
            <span class="trend-count">${total}</span>
          </div>
        `;
      });
      trendHtml += '</div>';
      trendHtml += `
        <div style="display:flex;gap:1rem;margin-top:0.75rem;justify-content:center;">
          <span style="display:flex;align-items:center;gap:0.3rem;font-size:0.7rem;color:var(--text-secondary)">
            <span style="width:10px;height:10px;border-radius:2px;background:linear-gradient(90deg,#6366f1,#818cf8)"></span>${t('trendLegendWM')}
          </span>
          <span style="display:flex;align-items:center;gap:0.3rem;font-size:0.7rem;color:var(--text-secondary)">
            <span style="width:10px;height:10px;border-radius:2px;background:linear-gradient(90deg,#10b981,#34d399)"></span>${t('trendLegendPA')}
          </span>
          <span style="display:flex;align-items:center;gap:0.3rem;font-size:0.7rem;color:var(--text-secondary)">
            <span style="width:10px;height:10px;border-radius:2px;background:linear-gradient(90deg,#f43f5e,#fb7185)"></span>${t('trendLegendMA')}
          </span>
        </div>
      `;
      document.getElementById('yearTrendChart').innerHTML = trendHtml;
      renderHotTopics('world_model');
    }

    let trendingData = {};  // loaded from output/trending.json
    let hotExpandedDomain = null;  // track which domain is expanded

    function _hotItem(name, desc, count, pct, rank, domain) {
      const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
      const tooltip = desc ? `title="${desc}"` : '';
      return `<div class="hot-item" ${tooltip}>
        <span class="hot-rank ${rankClass}">${rank}</span>
        <span class="hot-name">${name}</span>
        <div class="hot-bar-wrap"><div class="hot-bar ${domain}" style="width:${pct}%"></div></div>
        <span class="hot-count">${count}</span>
      </div>`;
    }

    function toggleHotMore(domain) {
      hotExpandedDomain = hotExpandedDomain === domain ? null : domain;
      renderHotTopics(domain);
    }

    function renderHotTopics(domain) {
      const domainNames = {world_model: t('domainNameWM'), physical_ai: t('domainNamePA'), medical_ai: t('domainNameMA')};
      let html = '<div style="display:flex;gap:0.3rem;margin-bottom:0.7rem;">';
      ['world_model', 'physical_ai', 'medical_ai'].forEach(d => {
        html += `<button data-hot-domain="${d}" style="padding:0.25rem 0.6rem;border-radius:6px;font-size:0.7rem;cursor:pointer;border:1px solid ${d===domain ? domainConfig[d].color : 'var(--border)'};background:${d===domain ? domainConfig[d].color+'1a' : 'var(--surface-bg)'};color:${d===domain ? domainConfig[d].color : 'var(--text-muted)'};font-weight:${d===domain?'600':'400'};transition:all 0.2s;">${domainNames[d]}</button>`;
      });
      html += '</div>';

      // Build item list: dynamic trending.json → fallback _tasks counting
      let allItems = [];
      const trends = trendingData[domain];
      if (trends && trends.length > 0) {
        allItems = trends.map(t => ({ name: t.display || t.term, count: t.count, desc: t.description || '' }));
      } else {
        const sixMonthsAgo = new Date();
        sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);
        const papers = allPapers.filter(p => p._domains?.includes(domain) && new Date(p.published) >= sixMonthsAgo);
        const kw = {};
        papers.forEach(p => { (p._tasks||[]).forEach(task => { const n = tn(task); kw[n] = (kw[n]||0)+1; }); });
        allItems = Object.entries(kw).sort((a,b) => b[1]-a[1]).map(([name, count]) => ({ name, count, desc: '' }));
      }

      const maxCount = Math.max(...allItems.map(it => it.count), 1);
      const TOP = 4;
      const visible  = allItems.slice(0, TOP);
      const hidden   = allItems.slice(TOP);
      const expanded = hotExpandedDomain === domain;

      visible.forEach(({ name, desc, count }, i) => {
        html += _hotItem(name, desc, count, (count/maxCount*100).toFixed(0), i+1, domain);
      });

      if (hidden.length > 0) {
        if (expanded) {
          hidden.forEach(({ name, desc, count }, i) => {
            html += _hotItem(name, desc, count, (count/maxCount*100).toFixed(0), TOP+i+1, domain);
          });
        }
        const btnLabel = expanded
          ? (currentLang === 'zh' ? '收起 ↑' : 'Show less ↑')
          : (currentLang === 'zh' ? `查看全部 ${allItems.length} 个 ↓` : `Show all ${allItems.length} ↓`);
        html += `<button onclick="toggleHotMore('${domain}')"
          style="margin-top:0.4rem;width:100%;padding:0.28rem 0;border-radius:6px;
            font-size:0.7rem;cursor:pointer;border:1px solid var(--border);
            background:var(--surface-bg);color:var(--text-muted);transition:all 0.18s;"
          onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-muted)'">
          ${btnLabel}
        </button>`;
      }

      document.getElementById('hotTopicsChart').innerHTML = html;
    }

    function renderSubdomains() {
      const now = new Date();
      const weekAgo = new Date(now.getTime() - 7*24*60*60*1000);
      const grid = document.getElementById('subdomainGrid');
      let html = '';
      const papersToShow = currentDomain === 'all' ? allPapers : allPapers.filter(p => p._domains?.includes(currentDomain));
      const domainsToShow = currentDomain === 'all' ? ['world_model', 'physical_ai', 'medical_ai'] : [currentDomain];

      domainsToShow.forEach(domain => {
        const tasks = domainTasks[domain];
        if (currentDomain === 'all') {
          html += `<div class="subdomain-domain-header">${t('tab'+domain.split('_').map((w,i)=>i?w.charAt(0).toUpperCase()+w.slice(1):w).join('').replace('Worldmodel','WM').replace('Physicalai','PA').replace('Medicalai','MA'))}</div>`;
          // Simpler: use domain name map
          const dn = {world_model: t('domainNameWM'), physical_ai: t('domainNamePA'), medical_ai: t('domainNameMA')};
          html = html.replace(/<div class="subdomain-domain-header">.*?<\/div>$/, `<div class="subdomain-domain-header">${dn[domain]}</div>`);
        }
        tasks.forEach(task => {
          let total = 0, newNum = 0;
          papersToShow.forEach(p => {
            if (p._tasks?.includes(task)) {
              total++;
              if (new Date(p.published) >= weekAgo) newNum++;
            }
          });
          const isActive = currentTask === task ? 'active' : '';
          const badge = newNum > 0 ? `<span class="new-badge">+${newNum}</span>` : '';
          html += `
            <div class="subdomain-item ${isActive}" data-task="${task}">
              <span class="name">${tn(task)}</span>
              <span class="count">${total}</span>
              ${badge}
            </div>
          `;
        });
      });
      grid.innerHTML = html;
    }

    function rebuildFilters() {
      // Year
      const ySel = document.getElementById('yearFilter');
      const curY = ySel.value;
      ySel.innerHTML = `<option value="all">${t('allYears')}</option>`;
      if (allPapers.length) {
        const years = [...new Set(allPapers.map(p => p.year))].sort((a,b) => b - a);
        years.forEach(y => { ySel.innerHTML += `<option value="${y}">${y}${t('yearSuffix')}</option>`; });
      }
      ySel.value = (curY && [...ySel.options].some(o => o.value === curY)) ? curY : 'all';
      // Month
      const mSel = document.getElementById('monthFilter');
      const curM = mSel.value;
      mSel.innerHTML = `<option value="all">${t('allMonths')}</option>`;
      t('monthNames').forEach((n,i) => { mSel.innerHTML += `<option value="${i+1}">${n}</option>`; });
      mSel.value = (curM && [...mSel.options].some(o => o.value === curM)) ? curM : 'all';
      // Type
      const tSel = document.getElementById('typeFilter');
      const curT = tSel.value;
      tSel.innerHTML = `<option value="all">${t('allTypes')}</option><option value="Method">${t('typeMethod')}</option><option value="Dataset">${t('typeDataset')}</option><option value="Survey">${t('typeSurvey')}</option>`;
      tSel.value = (curT && [...tSel.options].some(o => o.value === curT)) ? curT : 'all';
      // Sort
      const sSel = document.getElementById('sortSelect');
      const curS = sSel.value;
      sSel.innerHTML = `<option value="date-desc">${t('sortNewest')}</option><option value="date-asc">${t('sortOldest')}</option>`;
      sSel.value = (curS && [...sSel.options].some(o => o.value === curS)) ? curS : 'date-desc';
    }

    function initFilters() { rebuildFilters(); }

    function switchDomain(domain) {
      currentDomain = domain;
      currentTask = 'all';
      document.querySelectorAll('.domain-tab').forEach(tab => tab.classList.toggle('active', tab.dataset.domain === domain));
      document.getElementById('subdomainSection').style.display = domain === 'all' ? 'none' : '';
      renderSubdomains();
      applyFilters();
    }

    function filterByTask(task) {
      currentTask = currentTask === task ? 'all' : task;
      renderSubdomains();
      applyFilters();
    }

    function applyFilters() {
      filteredPapers = allPapers.filter(p => {
        if (!p._domains || p._domains.length === 0) return false;
        if (currentDomain !== 'all' && !p._domains?.includes(currentDomain)) return false;
        if (currentTask !== 'all' && !p._tasks?.includes(currentTask)) return false;
        if (currentYear !== 'all' && p.year !== parseInt(currentYear)) return false;
        if (currentMonth !== 'all' && p.month !== parseInt(currentMonth)) return false;
        if (currentType !== 'all' && p.type !== currentType) return false;
        if (showHasCode && !p.has_code) return false;
        if (currentQuery) {
          const q = currentQuery.toLowerCase();
          if (!p.title?.toLowerCase().includes(q) && !p.abstract?.toLowerCase().includes(q) && !p.authors?.some(a => a.toLowerCase().includes(q))) return false;
        }
        if (showFavorites && !favorites.includes(p.id)) return false;
        return true;
      });
      filteredPapers.sort((a, b) => currentSort === 'date-desc' ? new Date(b.published) - new Date(a.published) : new Date(a.published) - new Date(b.published));
      currentPage = 1;
      renderPapers();
      renderPagination();
    }

    function renderPapers() {
      const start = (currentPage-1) * PAGE_SIZE;
      const pagePapers = filteredPapers.slice(start, start + PAGE_SIZE);
      document.getElementById('resultsCount').textContent = t('paperCount')(filteredPapers.length);
      if (!pagePapers.length) { document.getElementById('papersGrid').innerHTML = `<div class="empty">${t('noMatch')}</div>`; return; }
      const typeLabel = {Method: t('badgeMethod'), Dataset: t('badgeDataset'), Survey: t('badgeSurvey')};
      const domainLabel = {world_model: t('domainNameWM'), physical_ai: t('domainNamePA'), medical_ai: t('domainNameMA')};
      document.getElementById('papersGrid').innerHTML = pagePapers.map(p => `
        <div class="paper-card${p._domains?.[0] ? ' domain-'+p._domains[0] : ''}">
          <div class="paper-domains">
            ${(p._domains||[]).map(d => `<span class="paper-domain-badge ${d}">${domainLabel[d]||d}</span>`).join('')}
            <span class="paper-type ${p.type}">${typeLabel[p.type]||p.type}</span>
          </div>
          <h3 class="paper-title">${escapeHTML(p.title)}</h3>
          <div class="paper-meta"><span>📅 ${p.published?.split('T')[0]}</span><span>✍️ ${(p.authors||[]).slice(0,2).join(', ')}${p.authors?.length>2?'...':''}</span>${p.has_code?'<span>💻</span>':''}</div>
          <p class="paper-abstract" data-id="${p.id}">${escapeHTML(p.abstract)}</p>
          <span class="abstract-toggle" data-id="${p.id}">${t('expandAbstract')}</span>
          <div class="paper-tags">${(p._tasks||[]).slice(0,5).map(task => `<span class="paper-task-tag">${tn(task)}</span>`).join('')}</div>
          <div class="paper-actions">
            <a href="${p.arxiv_url}" target="_blank" class="paper-action arxiv">🔗 arXiv</a>
            ${p.pdf_url ? `<a href="${p.pdf_url}" target="_blank" class="paper-action pdf">📄 PDF</a>` : ''}
            ${p.code ? `<a href="${p.code}" target="_blank" class="paper-action code">💻 code</a>` : ''}
            <button class="paper-action favorite ${favorites.includes(p.id)?'active':''}" data-fav-id="${p.id}">⭐</button>
          </div>
        </div>
      `).join('');
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredPapers.length / PAGE_SIZE);
      if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
      let html = `<button class="page-btn" data-page="${currentPage-1}" ${currentPage===1?'disabled':''}>‹</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage-1 && i <= currentPage+1)) html += `<button class="page-btn ${i===currentPage?'active':''}" data-page="${i}">${i}</button>`;
        else if (i === currentPage-2 || i === currentPage+2) html += `<span style="color:var(--text-muted)">…</span>`;
      }
      html += `<button class="page-btn" data-page="${currentPage+1}" ${currentPage===totalPages?'disabled':''}>›</button>`;
      document.getElementById('pagination').innerHTML = html;
    }
    function goPage(n) { currentPage = n; renderPapers(); renderPagination(); window.scrollTo({top: 0, behavior: 'smooth'}); }

    function toggleFavorite(id) {
      if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
      else favorites.push(id);
      localStorage.setItem('paperHubFavorites', JSON.stringify(favorites));
      if (showFavorites) applyFilters();
      else renderPapers();
    }

    function exportBibtex() {
      const papers = allPapers.filter(p => favorites.includes(p.id));
      if (!papers.length) { alert(t('alertNoFav')); return; }
      let bib = '';
      papers.forEach((p, i) => {
        const key = (p.authors?.[0]?.split(' ').pop() || 'unknown').toLowerCase();
        bib += `@article{${key}${p.year}${i},\n  title={${p.title}},\n  author={${(p.authors||[]).join(' and ')}},\n  year={${p.year}},\n  eprint={${p.id}},\n  archivePrefix={arXiv}\n}\n\n`;
      });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([bib], {type: 'text/plain'}));
      a.download = `favorites_${new Date().toISOString().slice(0,10)}.bib`;
      a.click();
    }

    function escapeHTML(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ====== Event listeners ======

    // Abstract toggle
    document.getElementById('papersGrid').addEventListener('click', e => {
      const toggle = e.target.closest('.abstract-toggle');
      if (!toggle) return;
      const id = toggle.dataset.id;
      const abs = document.querySelector(`.paper-abstract[data-id="${CSS.escape(id)}"]`);
      if (!abs) return;
      abs.classList.toggle('expanded');
      toggle.textContent = abs.classList.contains('expanded') ? t('collapseAbstract') : t('expandAbstract');
    });

    // Favorite toggle
    document.getElementById('papersGrid').addEventListener('click', e => {
      const btn = e.target.closest('[data-fav-id]');
      if (!btn) return;
      toggleFavorite(btn.dataset.favId);
    });

    // Doc modal
    document.getElementById('docBtn').addEventListener('click', () => {
      document.getElementById('docOverlay').classList.add('active');
    });
    document.getElementById('docClose').addEventListener('click', () => {
      document.getElementById('docOverlay').classList.remove('active');
    });
    document.getElementById('docOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) document.getElementById('docOverlay').classList.remove('active');
    });

    // Theme
    document.getElementById('themeToggle').addEventListener('click', e => {
      const btn = e.target.closest('[data-theme]');
      if (!btn) return;
      setTheme(btn.dataset.theme);
    });

    // Language
    document.getElementById('langToggle').addEventListener('click', e => {
      const btn = e.target.closest('[data-lang]');
      if (!btn) return;
      applyLang(btn.dataset.lang);
    });

    // Subdomain task filter
    document.getElementById('subdomainGrid').addEventListener('click', e => {
      const item = e.target.closest('.subdomain-item');
      if (!item) return;
      const task = item.getAttribute('data-task');
      if (task) filterByTask(task);
    });

    // Hot topics domain toggle
    document.getElementById('hotTopicsChart').addEventListener('click', e => {
      const btn = e.target.closest('[data-hot-domain]');
      if (!btn) return;
      renderHotTopics(btn.dataset.hotDomain);
    });

    // Stat cards
    document.querySelector('.stats-row').addEventListener('click', e => {
      const card = e.target.closest('[data-switch-domain]');
      if (!card) return;
      switchDomain(card.dataset.switchDomain);
    });

    // Pagination
    document.getElementById('pagination').addEventListener('click', e => {
      const btn = e.target.closest('[data-page]');
      if (!btn || btn.disabled) return;
      goPage(parseInt(btn.dataset.page));
    });

    // Domain tabs
    document.querySelectorAll('.domain-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        currentDomain = this.dataset.domain;
        currentTask = 'all';
        document.querySelectorAll('.domain-tab').forEach(x => x.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('subdomainSection').style.display = currentDomain === 'all' ? 'none' : '';
        renderSubdomains();
        applyFilters();
      });
    });

    // Filter changes
    document.getElementById('searchInput').addEventListener('input', e => { currentQuery = e.target.value; applyFilters(); });
    document.getElementById('yearFilter').addEventListener('change', e => { currentYear = e.target.value; applyFilters(); });
    document.getElementById('monthFilter').addEventListener('change', e => { currentMonth = e.target.value; applyFilters(); });
    document.getElementById('typeFilter').addEventListener('change', e => { currentType = e.target.value; applyFilters(); });
    document.getElementById('sortSelect').addEventListener('change', e => { currentSort = e.target.value; applyFilters(); });
    document.getElementById('hasCodeBtn').addEventListener('click', function() { showHasCode = !showHasCode; this.classList.toggle('active', showHasCode); applyFilters(); });
    document.getElementById('favoritesBtn').addEventListener('click', function() { showFavorites = !showFavorites; this.classList.toggle('active', showFavorites); applyFilters(); });
    document.getElementById('exportBtn').addEventListener('click', exportBibtex);

    // System theme change listener
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (localStorage.getItem('paperHubTheme') === 'system') applyTheme('system');
    });

    // ====== Boot ======
    (function() {
      // Apply saved theme
      const savedTheme = localStorage.getItem('paperHubTheme') || 'dark';
      applyTheme(savedTheme);
      // Apply saved language
      applyLang(currentLang);
      // Load data
      init();
    })();
  </script>
</body>
</html>
