name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Sync CCF Deadlines"
      - "Sync Papers Daily"
      - "Update Trending"
      - "Daily Curated Update"
      - "Fetch arXiv Daily"
      - "Sync Curated Weekly"
      - "Generate Weekly Picks"
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/
      - uses: actions/deploy-pages@v4
        id: deployment
