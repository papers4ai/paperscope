name: Sync CCF Deadlines

on:
  schedule:
    # Every 4 hours — picks up ccfddl updates quickly after PRs merge
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install pyyaml

      - name: Fetch latest data from ccfddl
        # Default (no args) fetches directly from ccfddl's deployed allconf.yml
        # This reflects the latest merged PRs without cloning the full repo
        run: python scripts/fetch_ccf_deadlines.py --online

      - name: Commit and push if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add frontend/data/deadlines.json
          if git diff --staged --quiet; then
            echo "✓ No changes to deadlines.json"
          else
            git commit -m "data: sync CCF deadlines $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase --autostash
            git push
            echo "✓ Pushed updated deadlines"
          fi
