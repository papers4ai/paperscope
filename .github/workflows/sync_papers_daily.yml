name: Sync papers.json from upstream

on:
  schedule:
    - cron: "30 2 * * *"   # 每天 02:30 UTC ≈ 北京 10:30
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Run incremental sync
        run: python scripts/update_papers.py
      - name: Commit & push if changed
        run: |
          if git diff --quiet frontend/data/papers.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/data/papers.json
          git commit -m "chore: incremental sync papers.json from upstream"
          git push
