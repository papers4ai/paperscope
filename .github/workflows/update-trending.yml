name: Weekly Trending Update

on:
  schedule:
    - cron: '0 2 * * 1'   # Every Monday at 02:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: write          # Needed to commit updated data files
  pages: write
  id-token: write

concurrency:
  group: trending-update
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate trending.json
        run: python scripts/gen_trending.py

      - name: Commit updated data (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data/trending.json
          if git diff --cached --quiet; then
            echo "No changes to trending.json — skipping commit."
          else
            git commit -m "chore: auto-update trending.json [$(date -u +%Y-%m-%d)]"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/

      - uses: actions/deploy-pages@v4
        id: deployment
