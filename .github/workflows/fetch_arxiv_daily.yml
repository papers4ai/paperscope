name: Fetch arXiv Daily

on:
  schedule:
    - cron: "0 2 * * *"    # UTC 02:00 = 北京 10:00
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Fetch arXiv → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m backend.main arxiv-daily --days 6
      - name: Export Supabase → papers.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/export_papers.py
      - name: Commit & push if changed
        run: |
          if git diff --quiet frontend/data/papers.json; then
            echo "No changes to papers.json"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add frontend/data/papers.json
            git commit -m "chore: daily arxiv sync $(date -u +%Y-%m-%d)"
            git pull --rebase
            git push
          fi
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
