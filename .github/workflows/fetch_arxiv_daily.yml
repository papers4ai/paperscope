name: Fetch arXiv Daily

on:
  schedule:
    - cron: "0 2 * * *"    # UTC 02:00 = 北京 10:00
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Fetch arXiv → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m backend.main arxiv-daily --days 6
      - name: Export Supabase → papers.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/export_papers.py
      - name: Commit & push if changed
        run: |
          if git diff --quiet frontend/data/papers.json; then
            echo "No changes to papers.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/data/papers.json
          git commit -m "chore: daily arxiv sync $(date -u +%Y-%m-%d)"
          git push
