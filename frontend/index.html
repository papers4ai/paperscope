<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🔭 Paperscope — AI Research Hub</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔭</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css?v=20260426d">
  <script>
  window.__PAPERSCOPE_CONFIG__ = {
    SUPABASE_URL: "https://tetmurpgybsfpicbjjwi.supabase.co",
    SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRldG11cnBneWJzZnBpY2JqandpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NzY0NjksImV4cCI6MjA5MjU1MjQ2OX0.tPIjHNXce2ckGCRLxr7M-KsRdaLYTQMzmx9A_IKLROw"
  };
  </script>
</head>
<body>
  <!-- 页眉：第一层导航 -->
  <header class="topbar">
    <div class="brand">🔭 <span>Paperscope</span></div>
    <nav class="mode-tabs">
      <button class="mode-tab active" data-mode="feed">📡 速览</button>
      <button class="mode-tab" data-mode="curated">🏆 精选</button>
      <button class="mode-tab" data-mode="trending">🔥 热榜</button>
    </nav>
    <input class="search" type="search" placeholder="搜索论文 / 作者 / 会议...">
    <button class="theme-toggle" id="btn-favorites-summary" title="我的收藏">⭐ <span id="fav-count">0</span></button>
    <button class="theme-toggle" id="theme-toggle" title="切换主题">🌙</button>
    <button class="btn-auth" id="btn-auth">登录</button>
  </header>

  <!-- 第二层：领域栏 -->
  <nav class="domain-bar">
    <button class="domain-tab active" data-domain="all">全部</button>
    <button class="domain-tab" data-domain="world_model">🌍 World Model</button>
    <button class="domain-tab" data-domain="physical_ai">🤖 Physical AI</button>
    <button class="domain-tab" data-domain="medical_ai">🏥 Medical AI</button>
  </nav>

  <!-- 主布局：左筛选 / 中列表 / 右面板 -->
  <main class="layout">
    <aside class="sidebar">
      <section class="curated-only" hidden>
        <h3>来源</h3>
        <label><input type="checkbox" name="source" value="s2" checked> 会议/期刊</label>
        <label><input type="checkbox" name="source" value="pubmed" checked> PubMed</label>
      </section>
      <section>
        <h3>代码</h3>
        <label><input type="checkbox" id="filter-has-code"> 仅显示有开源代码</label>
      </section>
      <section>
        <h3>年份</h3>
        <select id="filter-year">
          <option value="">全部</option>
          <option value="2026">2026</option>
          <option value="2025">2025</option>
          <option value="2024">2024</option>
          <option value="2023">2023</option>
        </select>
      </section>
      <section class="feed-only">
        <h3>月份</h3>
        <select id="filter-month">
          <option value="">全部月份</option>
          <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
          <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
          <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
          <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
        </select>
      </section>
      <section>
        <h3>收藏</h3>
        <label><input type="checkbox" id="filter-favorites"> 仅显示收藏</label>
      </section>
      <section id="filter-tier-section" class="curated-only" hidden>
        <h3>分类</h3>
        <select id="filter-tier">
          <option value="">全部分类</option>
          <option value="T1">T1 顶刊</option>
          <option value="T2">T2 期刊</option>
          <option value="CCF-A">CCF-A 顶会</option>
          <option value="视觉顶刊">视觉顶刊</option>
          <option value="机器人顶会">机器人顶会</option>
          <option value="医学顶会">医学顶会</option>
        </select>
      </section>
      <section id="filter-venue-section" class="curated-only" hidden>
        <h3>期刊 / 会议</h3>
        <select id="filter-venue">
          <option value="">全部</option>
        </select>
      </section>
      <section>
        <h3>类型</h3>
        <label><input type="checkbox" name="type" value="Method"> Method</label>
        <label><input type="checkbox" name="type" value="Dataset"> Dataset</label>
        <label><input type="checkbox" name="type" value="Survey"> Survey</label>
      </section>
      <section>
        <h3>排序</h3>
        <select id="sort-by">
          <option value="published_at">最新发表</option>
          <option value="citation_count">引用最多</option>
        </select>
      </section>
    </aside>

    <div class="main-col">
      <section class="dashboard feed-only" id="dashboard">
        <div class="stats-row">
          <div class="stat-card" data-key="total">
            <div class="stat-value">—</div>
            <div class="stat-label">全部 arXiv 论文</div>
          </div>
          <div class="stat-card" data-key="world_model" data-switch-domain="world_model">
            <div class="stat-value world_model">—</div>
            <div class="stat-label">World Model</div>
          </div>
          <div class="stat-card" data-key="physical_ai" data-switch-domain="physical_ai">
            <div class="stat-value physical_ai">—</div>
            <div class="stat-label">Physical AI</div>
          </div>
          <div class="stat-card" data-key="medical_ai" data-switch-domain="medical_ai">
            <div class="stat-value medical_ai">—</div>
            <div class="stat-label">Medical AI</div>
          </div>
        </div>

        <section class="subdomain-section feed-only" id="subdomain-section" hidden>
          <div class="subdomain-title">细分方向 · 本周新增</div>
          <div class="subdomain-grid" id="subdomain-grid"></div>
        </section>

        <div class="charts-section">
          <div class="chart-panel">
            <div class="chart-header">
              <span class="chart-icon">📈</span>
              <span class="chart-title">发布趋势</span>
              <span class="chart-note">按年份 × 领域</span>
            </div>
            <div class="chart-body" id="chart-trends">加载中...</div>
          </div>
          <div class="chart-panel">
            <div class="chart-header">
              <span class="chart-icon">🔥</span>
              <span class="chart-title">热门研究方向</span>
              <span class="chart-note">近 6 个月</span>
            </div>
            <div class="chart-body" id="chart-trending">加载中...</div>
          </div>
        </div>
      </section>

      <section class="paper-list" id="paper-list">
        <div class="loading">加载中...</div>
      </section>
    </div>

    <div class="fav-modal" id="fav-modal" hidden style="display:none">
      <div class="fav-modal-backdrop"></div>
      <div class="fav-modal-content">
        <div class="fav-modal-header">
          <h2>⭐ 我的收藏 <span id="fav-modal-count" class="fav-count-pill">0</span></h2>
          <div class="fav-modal-actions">
            <button id="fav-export" class="fav-mini-btn" title="导出 JSON">📥 导出</button>
            <button id="fav-clear" class="fav-mini-btn" title="清空收藏">🗑 清空</button>
            <button id="fav-modal-close" class="detail-close">✕</button>
          </div>
        </div>
        <div class="fav-modal-body" id="fav-modal-body"></div>
      </div>
    </div>
    <aside class="detail-panel" id="detail-panel" hidden>
      <button class="detail-close" id="detail-close">✕</button>
      <div class="detail-body"></div>
    </aside>
  </main>

  <script type="module" src="assets/js/app.js?v=20260426d"></script>
</body>
</html>
