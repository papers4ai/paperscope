<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🔭 Paperscope — AI Research Hub</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔭</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css?v=20260428e">
  <script>
  window.__PAPERSCOPE_CONFIG__ = {
    SUPABASE_URL: "https://vefqbfgcgfowuczmygmm.supabase.co",
    SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlZnFiZmdjZ2Zvd3Vjem15Z21tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNDY3MDgsImV4cCI6MjA5MjkyMjcwOH0.BKGZqvJ3qkox07tz9QJv3rOZz3yQjfytprj0RggH9U8"
  };
  </script>
</head>
<body>
  <!-- 页眉：第一层导航 -->
  <header class="topbar">
    <div class="brand">🔭 <span>Paperscope</span></div>
    <nav class="mode-tabs">
      <button class="mode-tab active" data-mode="feed">📡 速览</button>
      <button class="mode-tab" data-mode="curated">🏆 精选</button>
      <button class="mode-tab" data-mode="trending">🔥 热榜</button>
    </nav>
    <input class="search" type="search" placeholder="搜索论文 / 作者 / 会议...">
    <div class="topbar-right">
      <button class="theme-toggle" id="btn-favorites-summary" title="我的收藏">⭐ <span id="fav-count">0</span></button>
      <button class="theme-toggle" id="theme-toggle" title="切换主题">🌙</button>
      <button class="btn-auth" id="btn-auth">登录</button>
    </div>
  </header>

  <!-- 第二层：领域栏 -->
  <nav class="domain-bar">
    <button class="domain-tab active" data-domain="all">全部</button>
    <button class="domain-tab" data-domain="world_model">🌍 World Model</button>
    <button class="domain-tab" data-domain="physical_ai">🤖 Physical AI</button>
    <button class="domain-tab" data-domain="medical_ai">🏥 Medical AI</button>
  </nav>

  <!-- 精选模式：全宽领域 × 年份 × 期刊/会议选择器 -->
  <section class="venue-picker curated-only" id="venue-picker">
    <div class="vp-header">
      <div class="venue-picker-domains" id="venue-picker-domains">
        <button class="vpd-btn active" data-domain="all">🔭 全部领域</button>
        <button class="vpd-btn world_model" data-domain="world_model">🌍 World Model</button>
        <button class="vpd-btn physical_ai" data-domain="physical_ai">🤖 Physical AI</button>
        <button class="vpd-btn medical_ai" data-domain="medical_ai">🏥 Medical AI</button>
      </div>
      <div class="vp-year-row" id="vp-year-row">
        <span class="vp-year-label">年份</span>
        <button class="vpy-btn active" data-year="">全部</button>
        <button class="vpy-btn" data-year="2026">2026</button>
        <button class="vpy-btn" data-year="2025">2025</button>
        <button class="vpy-btn" data-year="2024">2024</button>
        <button class="vpy-btn" data-year="2023">2023</button>
      </div>
    </div>
    <div class="venue-picker-body" id="venue-picker-body">请选择领域</div>
  </section>

  <!-- 主布局：左筛选 / 中列表 / 右面板 -->
  <main class="layout">
    <aside class="sidebar">
      <section class="feed-only">
        <h3>来源</h3>
        <label><input type="checkbox" name="source" value="arxiv" checked> arXiv 预印本</label>
      </section>
      <section>
        <h3>代码</h3>
        <label><input type="checkbox" id="filter-has-code"> 仅显示有开源代码</label>
      </section>
      <section class="feed-only">
        <h3>年份</h3>
        <select id="filter-year">
          <option value="">全部</option>
          <option value="2026">2026</option>
          <option value="2025">2025</option>
          <option value="2024">2024</option>
          <option value="2023">2023</option>
        </select>
      </section>
      <section class="feed-only">
        <h3>月份</h3>
        <select id="filter-month">
          <option value="">全部月份</option>
          <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
          <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
          <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
          <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
        </select>
      </section>
      <section>
        <h3>收藏</h3>
        <label><input type="checkbox" id="filter-favorites"> 仅显示收藏</label>
      </section>
      <!-- 分类/期刊会议已移至主区域 venue picker，精选模式不再在侧栏展示 -->
      <select id="filter-tier" hidden></select>
      <select id="filter-venue" hidden></select>
      <section>
        <h3>类型</h3>
        <label><input type="checkbox" name="type" value="Method"> Method</label>
        <label><input type="checkbox" name="type" value="Dataset"> Dataset</label>
        <label><input type="checkbox" name="type" value="Survey"> Survey</label>
      </section>
      <section>
        <h3>排序</h3>
        <select id="sort-by">
          <option value="published_at">最新发表</option>
          <option value="citation_count">引用最多</option>
        </select>
      </section>
    </aside>

    <div class="main-col">
      <section class="dashboard feed-only" id="dashboard">
        <div class="stats-row">
          <div class="stat-card" data-key="total">
            <div class="stat-value">—</div>
            <div class="stat-label">全部 arXiv 论文</div>
          </div>
          <div class="stat-card" data-key="world_model" data-switch-domain="world_model">
            <div class="stat-value world_model">—</div>
            <div class="stat-label">World Model</div>
          </div>
          <div class="stat-card" data-key="physical_ai" data-switch-domain="physical_ai">
            <div class="stat-value physical_ai">—</div>
            <div class="stat-label">Physical AI</div>
          </div>
          <div class="stat-card" data-key="medical_ai" data-switch-domain="medical_ai">
            <div class="stat-value medical_ai">—</div>
            <div class="stat-label">Medical AI</div>
          </div>
        </div>

        <section class="subdomain-section feed-only" id="subdomain-section" hidden>
          <div class="subdomain-title">细分方向 · 本周新增</div>
          <div class="subdomain-grid" id="subdomain-grid"></div>
        </section>

        <div class="charts-section">
          <div class="chart-panel">
            <div class="chart-header">
              <span class="chart-icon">📈</span>
              <span class="chart-title">发布趋势</span>
              <span class="chart-note">按年份 × 领域</span>
            </div>
            <div class="chart-body" id="chart-trends">加载中...</div>
          </div>
          <div class="chart-panel">
            <div class="chart-header">
              <span class="chart-icon">🔥</span>
              <span class="chart-title">热门研究方向</span>
              <span class="chart-note">近 6 个月</span>
            </div>
            <div class="chart-body" id="chart-trending">加载中...</div>
          </div>
        </div>
      </section>

      <section class="paper-list" id="paper-list">
        <div class="loading">加载中...</div>
      </section>
    </div>

    <div class="fav-modal" id="fav-modal" hidden style="display:none">
      <div class="fav-modal-backdrop"></div>
      <div class="fav-modal-content">
        <div class="fav-modal-header">
          <h2>⭐ 我的收藏 <span id="fav-modal-count" class="fav-count-pill">0</span></h2>
          <div class="fav-modal-actions">
            <div class="fav-export-wrap">
              <button id="fav-export" class="fav-mini-btn" title="导出收藏">📥 导出 ▾</button>
              <div class="fav-export-menu" id="fav-export-menu" hidden>
                <div class="fav-export-item" data-fmt="csv">
                  <span class="fav-export-item-icon">📊</span>
                  <span class="fav-export-item-label">CSV</span>
                  <span class="fav-export-item-hint">Excel / Notion</span>
                </div>
                <div class="fav-export-item" data-fmt="bib">
                  <span class="fav-export-item-icon">📖</span>
                  <span class="fav-export-item-label">BibTeX</span>
                  <span class="fav-export-item-hint">Zotero / Overleaf</span>
                </div>
                <div class="fav-export-item" data-fmt="json">
                  <span class="fav-export-item-icon">🗂</span>
                  <span class="fav-export-item-label">JSON</span>
                  <span class="fav-export-item-hint">开发者 / 备份</span>
                </div>
              </div>
            </div>
            <button id="fav-clear" class="fav-mini-btn" title="清空收藏">🗑 清空</button>
            <button id="fav-modal-close" class="detail-close">✕</button>
          </div>
        </div>
        <div class="fav-modal-layout">
          <!-- 左侧标签侧栏 -->
          <div class="fav-tag-sidebar" id="fav-tag-sidebar"></div>
          <!-- 右侧论文列表 -->
          <div class="fav-modal-body" id="fav-modal-body"></div>
        </div>
      </div>
    </div>
    <aside class="detail-panel" id="detail-panel" hidden>
      <button class="detail-close" id="detail-close">✕</button>
      <div class="detail-body"></div>
    </aside>
  </main>

  <!-- ========== Footer ========== -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-stat">
        <span class="footer-icon">📄</span>
        累计浏览
        <span id="busuanzi_value_site_pv" class="footer-num">—</span>
        次
      </div>
      <div class="footer-stat">
        <span class="footer-icon">🕒</span>
        数据最新更新：<span id="footer-last-updated" class="footer-num">加载中…</span>
      </div>
    </div>
  </footer>

  <!-- 不蒜子访客统计（异步，不阻塞渲染） -->
  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

  <!-- ========== Auth Modal ========== -->
  <div class="auth-modal" id="auth-modal" hidden>
    <div class="auth-backdrop" id="auth-backdrop"></div>
    <div class="auth-box">
      <button class="auth-close" id="auth-close">✕</button>

      <!-- Tab 切换：登录 / 注册 -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">登录</button>
        <button class="auth-tab" data-tab="register">注册</button>
      </div>

      <!-- 登录表单 -->
      <form class="auth-form" id="auth-form-login" data-tab="login">
        <label>邮箱<input type="email" id="auth-email-login" placeholder="you@example.com" autocomplete="email"></label>
        <label>密码<input type="password" id="auth-pass-login" placeholder="至少 8 位" autocomplete="current-password"></label>
        <div class="auth-error" id="auth-err-login"></div>
        <button type="submit" class="auth-submit">登录</button>
      </form>

      <!-- 注册表单 -->
      <form class="auth-form hidden" id="auth-form-register" data-tab="register">
        <label>邮箱<input type="email" id="auth-email-register" placeholder="you@example.com" autocomplete="email"></label>
        <label>密码<input type="password" id="auth-pass-register" placeholder="至少 8 位" autocomplete="new-password"></label>
        <div class="auth-error" id="auth-err-register"></div>
        <button type="submit" class="auth-submit">注册</button>
      </form>

      <div class="auth-divider"><span>或</span></div>

      <!-- GitHub OAuth -->
      <button class="auth-github" id="auth-github">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.083-.729.083-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12"/></svg>
        使用 GitHub 登录
      </button>

      <!-- 已登录状态 -->
      <div class="auth-logged-in hidden" id="auth-logged-in">
        <div class="auth-avatar" id="auth-avatar">👤</div>
        <div class="auth-user-email" id="auth-user-email"></div>
        <button class="auth-signout" id="auth-signout">退出登录</button>
      </div>
    </div>
  </div>

  <script type="module" src="assets/js/app.js?v=20260428e"></script>
</body>
</html>
